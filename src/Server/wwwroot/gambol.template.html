<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambit</title>
    <script>if (location.hostname === "localhost" || location.hostname === "127.0.0.1") 
        document.title = "Local Ambit";</script>
    <link rel="stylesheet" href="/ambit/style.css">
    <link id="user-css" rel="stylesheet" href="/ambit/user.css">
</head>
<body>
    <div id="app">
        Loading...
        <input id="hidden-input" class="amb-hidden-input" autocomplete="off" tabindex="-1">
        <div id="amb-sticky-header" class="amb-sticky-header">
            <div class="amb-header-row1">
                <a id="logout-link" class="amb-logout-link" href="/ambit/logout">Logout</a>
                <button type="button" id="reload-btn" class="amb-reload-btn">⟳ Reload</button>
                <div id="undo-status" class="amb-undo-status" title="Undo/Redo status"></div>
            </div>
            <div class="amb-header-row2">
                <span id="key-last-key" class="amb-last-key"></span>
                <span id="server-build-stamp" class="amb-last-key" title="Server build timestamp"></span>
                <div id="sync-status" class="amb-sync-status"></div>
            </div>
        </div>
        <div id="command-palette" class="amb-palette">
            <input id="command-palette-input" class="amb-palette-input" type="text" placeholder="Search commands..." autocomplete="off">
            <ul id="command-palette-results" class="amb-palette-results"></ul>
        </div>
        <div id="css-class-prompt" class="amb-palette">
            <input id="css-class-prompt-input" class="amb-palette-input" type="text" placeholder="Classes (space-separated)" autocomplete="off">
        </div>
    </div>
    <script type="module" src="/ambit/Program.js"></script>
</body>
</html>
